function summary(b){var total=0,filled=0,red=0,redFilled=0,highNoProof=0,photoCount=0,zoneCount=0;BLOCKS.forEach(function(bl){var s=b.scores[bl.id];if(s.score!==''){total+=Number(s.score)*bl.weight/100;filled++;if(Number(s.score)>=60&&(!s.zone||!(s.photos||[]).length))highNoProof++;}if(s.zone)zoneCount++;photoCount+=(s.photos||[]).length;});Object.keys(b.risks).forEach(function(k){var r=b.risks[k];if(r.value==='Да'||r.value==='Нет')redFilled++;if(r.value==='Да')red++;if(r.zone)zoneCount++;photoCount+=(r.photos||[]).length;});(b.defects||[]).forEach(function(d){if(d.zone)zoneCount++;photoCount+=(d.photos||[]).length;});var base=[b.name,b.address,b.type,b.date,b.person,b.role].filter(Boolean).length;var required=6+RISKS.length+BLOCKS.length;var complete=Math.round((base+redFilled+filled)/required*100);var index=Math.round(total*10)/10;var status=statusFrom(index,red,b);var qualityScore=complete*.6+Math.min(100,photoCount*10)*.25+Math.min(100,zoneCount*7)*.15;var quality=qualityScore>=85?'Высокое':qualityScore>=60?'Среднее':'Низкое';return{index:index,indexText:filled?index.toFixed(1)+' %':'—',filled:filled,scoreCount:BLOCKS.length,red:red,redFilled:redFilled,complete:complete,status:status,quality:quality,photoCount:photoCount,highNoProof:highNoProof};}
function statusFrom(index,red,b){if(red>0)return'Требуется внеплановая проверка';var sanitary=b&&b.scores&&b.scores.sanitary?Number(b.scores.sanitary.score||0):0;if((b.type==='Пищеблок'||b.type==='КДЛ')&&sanitary>=60)return'Высокий санитарно-эксплуатационный риск';var fire=b&&b.scores&&b.scores.fire?Number(b.scores.fire.score||0):0;var electric=b&&b.scores&&b.scores.electric?Number(b.scores.electric.score||0):0;if(b&&b.patients==='Да'&&(fire>=80||electric>=80))return'Срочная проверка';if(index>80)return'Критическое состояние по визуальной оценке';if(index>60)return'Высокий износ';if(index>40)return'Существенный износ';if(index>20)return'Умеренный износ';return'Удовлетворительное состояние';}

function conclusion(s){if(s.red>0)return'Выявлены критические признаки технического и эксплуатационного риска. Требуется внеплановая проверка соответствующей зоны, конструктивного элемента или инженерной системы с привлечением профильной специализированной организации. Итоговый процент предварительного износа не может рассматриваться как достаточное основание для продолжения эксплуатации без дополнительной оценки.';if(/санитарно|Сроч/.test(s.status))return'Выявлен повышенный риск для эксплуатации здания с учётом типа объекта, наличия пациентов или характера дефекта. Требуется приоритетная проверка соответствующих зон и инженерных систем.';if(s.index>80)return'Состояние по визуальной оценке критическое. Требуется срочное техническое обследование специализированной организацией и управленческое решение о дальнейшей эксплуатации.';if(s.index>60)return'Выявлены признаки высокого физического износа. Требуется внеплановое обследование, приоритизация капитального ремонта и рассмотрение вопроса об ограничении эксплуатации отдельных зон.';if(s.index>40)return'Выявлены признаки существенного физического износа. Рекомендуется рассмотреть включение здания в программу капитального ремонта и провести обследование проблемных блоков.';if(s.index>20)return'Выявлены признаки умеренного физического износа. Рекомендуется сформировать перечень мероприятий текущего ремонта и уточнить дефектные зоны.';return'Состояние по предварительной визуальной самооценке удовлетворительное. Рекомендуется штатная эксплуатация, плановое обслуживание и локальное устранение выявленных дефектов.';}

function facilitySummary(f){var sum=0,areaSum=0,red=0,comp=0,qualityNum=0;f.buildings.forEach(function(b){var s=summary(b);var area=Number(String(b.area||'').replace(',','.'))||1;if(s.filled){sum+=s.index*area;areaSum+=area;}red+=s.red;comp+=s.complete;qualityNum+=s.quality==='Высокое'?3:s.quality==='Среднее'?2:1;});var idx=areaSum?Math.round(sum/areaSum*10)/10:0;return{index:idx,indexText:areaSum?idx.toFixed(1)+' %':'—',red:red,complete:Math.round(comp/Math.max(1,f.buildings.length)),quality:qualityNum/f.buildings.length>=2.5?'Высокое':qualityNum/f.buildings.length>=1.7?'Среднее':'Низкое',status:red>0?'Требуется внеплановая проверка':statusFrom(idx,0,{scores:{sanitary:{score:''}},type:'',patients:''})};}

    recalcAndRender = function(){
      originalRecalc();
      updateBottomMiniFromKpi();
    };
  }
  window.addEventListener("DOMContentLoaded", function(){
    setTimeout(updateBottomMiniFromKpi, 200);
    setInterval(updateBottomMiniFromKpi, 1000);
  });
})();


</script>
